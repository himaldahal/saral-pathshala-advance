{% extends 'login_base.html' %}
{% block title %}Reset Password{% endblock %}

{% block auth_content %}
<div>
    <h2 class="h3 fw-bold mb-2">Set New Password</h2>
    <p class="text-muted mb-4">Please choose a strong password of at least 8 characters to secure your account.</p>

    <form method="POST" novalidate>
        {% csrf_token %}
        
        <div class="form-floating mb-3 position-relative">
            <input type="password" class="form-control ui-input" id="new_password" name="password" placeholder="New Password" required>
            <label for="new_password"><i class="bi bi-shield-lock me-2"></i>New Password</label>
            <i class="bi bi-eye password-toggle" data-target="new_password"></i>
        </div>

        <div class="form-floating mb-4 position-relative">
            <input type="password" class="form-control ui-input" id="confirm_password" name="password_confirm" placeholder="Confirm Password" required>
            <label for="confirm_password"><i class="bi bi-shield-lock-fill me-2"></i>Confirm Password</label>
            <i class="bi bi-eye password-toggle" data-target="confirm_password"></i>
        </div>

        <button type="submit" class="btn btn-brand-primary w-100">Reset Password & Login <i class="bi bi-check-circle ms-2"></i></button>
    </form>
</div>
{% endblock %}
