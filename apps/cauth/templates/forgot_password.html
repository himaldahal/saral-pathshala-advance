{% extends 'login_base.html' %}
{% block title %}Forgot Password{% endblock %}

{% block auth_content %}
<div>
    <h2 class="h3 fw-bold mb-2">Forgot Password?</h2>
    <p class="text-muted mb-4">Enter your registered email address below, and we will dispatch a secure link to reset your password.</p>

    <form method="POST" novalidate>
        {% csrf_token %}
        <input type="text" name="website_url" style="display: none;" tabindex="-1" autocomplete="off">
        
        <div class="form-floating mb-4 position-relative">
            <input type="email" class="form-control ui-input" id="reset_email" name="email" placeholder="Email Address" required>
            <label for="reset_email"><i class="bi bi-envelope me-2"></i>Email Address</label>
        </div>

        <button type="submit" class="btn btn-brand-primary w-100">Send Reset Link <i class="bi bi-send ms-2"></i></button>
    </form>

    <div class="text-center mt-5 text-muted" style="font-size: 0.95rem;">
        Remembered your password? <a href="{% url 'login' %}" class="link-text">Log in here</a>
    </div>
</div>
{% endblock %}
